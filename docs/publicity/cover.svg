<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">lay double Shift layout rescue cover</title>
  <desc id="desc">A clean dark cover showing wrong-layout text ghbdtn becoming привет after double Shift.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18212c"/>
      <stop offset="0.55" stop-color="#101820"/>
      <stop offset="1" stop-color="#23351f"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity="0.18">
    <path d="M120 690 C360 580 520 770 760 650 C980 540 1130 600 1480 500" fill="none" stroke="#8bcf8b" stroke-width="3"/>
    <path d="M80 210 C350 330 520 160 810 260 C1070 350 1260 230 1530 330" fill="none" stroke="#64b5f6" stroke-width="3"/>
  </g>

  <g transform="translate(140 120)">
    <text x="0" y="0" fill="#f5f7fa" font-family="Inter, Cantarell, Arial, sans-serif" font-size="92" font-weight="800">lay</text>
    <text x="0" y="58" fill="#bfd3c1" font-family="Inter, Cantarell, Arial, sans-serif" font-size="32" font-weight="500">Double Shift layout rescue for GNOME Wayland</text>
  </g>

  <g transform="translate(170 285)" filter="url(#softShadow)">
    <rect x="0" y="0" width="1260" height="330" rx="34" fill="#f7f7f2"/>
    <rect x="44" y="44" width="1172" height="102" rx="18" fill="#e7ebf0"/>
    <rect x="44" y="184" width="1172" height="102" rx="18" fill="#dff2df"/>

    <text x="82" y="111" fill="#28313b" font-family="JetBrains Mono, Fira Code, monospace" font-size="58" font-weight="700">ghbdtn</text>
    <text x="82" y="251" fill="#1f3a24" font-family="JetBrains Mono, Fira Code, monospace" font-size="58" font-weight="700">привет</text>

    <g transform="translate(780 76)">
      <rect x="0" y="0" width="132" height="58" rx="14" fill="#263241"/>
      <text x="66" y="39" text-anchor="middle" fill="#ffffff" font-family="Inter, Cantarell, Arial, sans-serif" font-size="26" font-weight="700">Shift</text>
      <rect x="152" y="0" width="132" height="58" rx="14" fill="#263241"/>
      <text x="218" y="39" text-anchor="middle" fill="#ffffff" font-family="Inter, Cantarell, Arial, sans-serif" font-size="26" font-weight="700">Shift</text>
    </g>

    <path d="M920 156 L920 174" stroke="#758195" stroke-width="5" stroke-linecap="round"/>
    <path d="M900 170 L920 190 L940 170" fill="none" stroke="#758195" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(190 705)">
    <text x="0" y="0" fill="#d9e8dc" font-family="Inter, Cantarell, Arial, sans-serif" font-size="34" font-weight="700">Local-first · Rust · evdev/uinput · GNOME Shell bridge</text>
    <text x="0" y="54" fill="#aebbc7" font-family="Inter, Cantarell, Arial, sans-serif" font-size="28">No cloud required for the normal double-Shift path</text>
  </g>
</svg>

